<svg width="1800" height="640" viewBox="0 0 900 320" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Bangladesh Thana-Level Reference Dataset — FMCG Analytics Banner</title>
<desc>Bangladesh flag with accurate country map beside the red disc and dataset title on the right</desc>

<!-- ── Clean Bangladesh flag ── -->
<rect width="900" height="320" fill="#006A4E"/>
<circle cx="390" cy="160" r="120" fill="#F42A41"/>

<!-- Right panel dark overlay for text readability -->
<rect x="530" y="0" width="370" height="320" fill="#000000" fill-opacity="0.40"/>
<rect x="0"   y="0"   width="900" height="48"  fill="#000000" fill-opacity="0.14"/>
<rect x="0"   y="272" width="900" height="48"  fill="#000000" fill-opacity="0.14"/>

<!-- ── REAL Bangladesh map boundary ── -->
<!-- Scaled to fit x:18–255, y:22–296 — entirely LEFT of red disc (disc edge at x=270) -->
<path
  fill="#004d38" fill-opacity="0.90"
  stroke="#7eedc7" stroke-width="1.0" stroke-opacity="0.60"
  d="M 25.2,33.7 L 30.4,27.5 L 42.8,25.0 L 48.0,30.1 L 58.9,37.7
